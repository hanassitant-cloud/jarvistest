<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>文文 GitHub Pages 測試</title>
  <style>
    body{margin:0;min-height:100vh;display:grid;place-items:center;background:linear-gradient(135deg,#111827,#312e81,#0f766e);color:white;font-family:-apple-system,BlinkMacSystemFont,"Noto Sans TC",sans-serif}
    .card{max-width:760px;padding:48px;border:1px solid rgba(255,255,255,.24);border-radius:28px;background:rgba(255,255,255,.12);box-shadow:0 30px 80px rgba(0,0,0,.35);backdrop-filter:blur(16px)}
    h1{font-size:44px;margin:0 0 16px}.tag{opacity:.8;letter-spacing:.08em;text-transform:uppercase}.ok{font-size:22px;line-height:1.7}.time{margin-top:24px;opacity:.75}
  </style>
</head>
<body>
  <main class="card">
    <div class="tag">GitHub Pages Test</div>
    <h1>文文已經可以發佈 HTML 投影片了 🧠</h1>
    <p class="ok">如果你看到這一頁，代表 OpenClaw → GitHub → GitHub Pages 的發佈流程已經打通。</p>
    <p class="time">Published by 文文 for Jason.</p>
  </main>
</body>
</html>
