<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>文文超能力</title>
  <meta name="description" content="文文超能力主入口：互動式 PPT 與文文技能列表。">
  <style>
    :root{--bg:#f6f8fb;--ink:#132033;--muted:#667085;--line:#d9e2ef;--panel:#fff;--blue:#1769e0;--teal:#0f9f8f;--dark:#0f172a}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;background:linear-gradient(180deg,#ffffff 0%,#eef6ff 52%,#f6f8fb 100%);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",Arial,sans-serif}
    main{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px 18px}
    .wrap{width:min(1040px,100%)}
    header{margin-bottom:24px}
    .kicker{font-size:13px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:var(--teal);margin-bottom:10px}
    h1{font-size:clamp(42px,8vw,92px);line-height:.95;letter-spacing:0;margin:0;color:var(--dark)}
    .lead{font-size:clamp(17px,2.3vw,22px);line-height:1.55;color:var(--muted);max-width:760px;margin:18px 0 0}
    .grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;margin-top:34px}
    a.card{display:flex;min-height:230px;flex-direction:column;justify-content:space-between;text-decoration:none;background:rgba(255,255,255,.9);border:1px solid var(--line);border-radius:10px;padding:26px;box-shadow:0 18px 55px rgba(15,23,42,.1);transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}
    a.card:hover{transform:translateY(-3px);box-shadow:0 24px 70px rgba(15,23,42,.16);border-color:#9cc7ff}
    .icon{width:48px;height:48px;border-radius:10px;display:grid;place-items:center;color:#fff;font-size:24px;font-weight:900;background:linear-gradient(135deg,var(--blue),var(--teal));margin-bottom:20px}
    h2{font-size:30px;line-height:1.15;margin:0 0 10px;color:var(--dark);letter-spacing:0}
    .card p{margin:0;color:#475467;line-height:1.55;font-size:16px}
    .go{margin-top:22px;font-weight:900;color:var(--blue)}
    footer{margin-top:24px;color:var(--muted);font-size:13px;line-height:1.6}
    @media(max-width:760px){main{align-items:flex-start;padding-top:42px}.grid{grid-template-columns:1fr}a.card{min-height:190px;padding:22px}h2{font-size:26px}}
  </style>
</head>
<body>
  <main>
    <div class="wrap">
      <header>
        <div class="kicker">WenWen Superpowers</div>
        <h1>文文超能力</h1>
        <p class="lead">這是文文的固定主入口。互動式 PPT 作品與文文技能列表都從這裡進入；之後更新簡報或技能時，都回到這個主網頁查看。</p>
      </header>
      <section class="grid" aria-label="主要入口">
        <a class="card" href="./ppt-catalog/">
          <div>
            <div class="icon">P</div>
            <h2>互動式 PPT</h2>
            <p>查看文文已發布的 HTML PPT 主目錄列表。最新作品會排在最上面，依日期由新到舊排列。</p>
          </div>
          <div class="go">進入 PPT 主目錄 →</div>
        </a>
        <a class="card" href="./wenwen-skills/">
          <div>
            <div class="icon">S</div>
            <h2>文文的技能</h2>
            <p>查看文文目前已安裝、可使用、候選中的技能清單，包含每個技能的中文說明與用途。</p>
          </div>
          <div class="go">進入技能列表 →</div>
        </a>
      </section>
      <footer>公開 GitHub Pages 頁面只放可公開展示內容；機密資料、Token、密碼、客戶內部文件不放在此處。最後更新：2026-05-17</footer>
    </div>
  </main>
</body>
</html>
