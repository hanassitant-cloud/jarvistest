<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>文文超能力</title>
  <meta name="description" content="文文超能力主入口：互動式 PPT 與文文技能列表。">
  <style>
    :root{
      --bg0:#020617;
      --bg1:#07162d;
      --panel:rgba(16,27,51,.72);
      --panel2:rgba(18,24,41,.86);
      --line:rgba(119,219,255,.46);
      --line2:rgba(148,163,184,.22);
      --ink:#f8fafc;
      --muted:#bfd2e8;
      --soft:#8aa5bf;
      --cyan:#67e8f9;
      --mint:#86efac;
      --blue:#60a5fa;
      --shadow:0 28px 80px rgba(0,0,0,.36);
    }
    *{box-sizing:border-box}
    html{min-height:100%;background:var(--bg0)}
    body{
      margin:0;
      min-height:100vh;
      color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",Arial,sans-serif;
      background:
        radial-gradient(circle at 20% 0%,rgba(96,165,250,.34),transparent 34rem),
        radial-gradient(circle at 85% 10%,rgba(52,211,153,.2),transparent 30rem),
        linear-gradient(145deg,var(--bg1) 0%,#081024 42%,#030712 100%);
    }
    body:before{
      content:"";
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(180deg,rgba(255,255,255,.05),transparent 28%),
        repeating-linear-gradient(90deg,rgba(255,255,255,.025) 0 1px,transparent 1px 96px);
      mask-image:linear-gradient(180deg,#000,transparent 78%);
    }
    main{
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:34px 22px 42px;
      position:relative;
    }
    .wrap{width:min(1040px,100%)}
    header{margin:0 0 30px}
    .eyebrow{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:#dbeafe;
      font-size:14px;
      font-weight:800;
      letter-spacing:.08em;
      text-transform:uppercase;
      margin-bottom:14px;
      opacity:.9;
    }
    .eyebrow:before{
      content:"";
      width:10px;
      height:10px;
      border-radius:99px;
      background:linear-gradient(135deg,var(--cyan),var(--mint));
      box-shadow:0 0 22px rgba(103,232,249,.65);
    }
    h1{
      margin:0;
      font-size:clamp(46px,8vw,96px);
      line-height:.96;
      letter-spacing:0;
      font-weight:950;
      color:#fff;
      text-shadow:0 18px 54px rgba(0,0,0,.36);
    }
    .lead{
      max-width:780px;
      margin:18px 0 0;
      color:var(--muted);
      font-size:clamp(17px,2.3vw,22px);
      line-height:1.62;
    }
    .grid{
      display:grid;
      grid-template-columns:repeat(2,minmax(0,1fr));
      gap:22px;
      margin-top:34px;
    }
    .card{
      min-height:382px;
      display:flex;
      flex-direction:column;
      justify-content:space-between;
      text-decoration:none;
      color:inherit;
      padding:32px;
      border-radius:28px;
      border:1px solid var(--line2);
      background:linear-gradient(150deg,var(--panel),var(--panel2));
      box-shadow:var(--shadow);
      backdrop-filter:blur(22px);
      position:relative;
      overflow:hidden;
      transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease;
    }
    .card:first-child{border-color:var(--line)}
    .card:after{
      content:"";
      position:absolute;
      inset:0;
      background:linear-gradient(135deg,rgba(103,232,249,.12),transparent 38%,rgba(134,239,172,.08));
      opacity:.72;
      pointer-events:none;
    }
    .card > *{position:relative;z-index:1}
    .card:hover{
      transform:translateY(-4px);
      border-color:rgba(103,232,249,.72);
      box-shadow:0 34px 90px rgba(0,0,0,.48),0 0 0 1px rgba(103,232,249,.18) inset;
    }
    .icon{
      width:72px;
      height:72px;
      display:grid;
      place-items:center;
      margin-bottom:34px;
      border-radius:24px;
      font-size:36px;
      background:linear-gradient(135deg,#6ee7f9 0%,#8b5cf6 100%);
      box-shadow:0 22px 42px rgba(14,165,233,.22);
    }
    h2{
      margin:0 0 14px;
      font-size:clamp(32px,4vw,43px);
      line-height:1.08;
      letter-spacing:0;
      color:#fff;
    }
    .card p{
      max-width:480px;
      margin:0;
      color:var(--muted);
      font-size:19px;
      line-height:1.72;
    }
    .cta{
      align-self:flex-start;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:54px;
      margin-top:28px;
      padding:13px 24px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--cyan),var(--mint));
      color:#04111f;
      font-weight:950;
      font-size:18px;
      letter-spacing:0;
      box-shadow:0 16px 38px rgba(45,212,191,.2);
    }
    footer{
      margin-top:24px;
      color:var(--soft);
      font-size:13px;
      line-height:1.65;
    }
    @media(max-width:820px){
      main{align-items:flex-start;padding:44px 16px 34px}
      .grid{grid-template-columns:1fr;gap:18px;margin-top:28px}
      .card{min-height:324px;border-radius:24px;padding:28px 24px}
      .icon{width:68px;height:68px;margin-bottom:30px}
      .card p{font-size:18px}
      .cta{font-size:17px}
    }
    @media(max-width:430px){
      main{padding-left:14px;padding-right:14px}
      .card{min-height:310px;padding:25px 22px}
      .card p{font-size:17px;line-height:1.68}
      .cta{width:100%}
    }
  </style>
</head>
<body>
  <main>
    <div class="wrap">
      <header>
        <div class="eyebrow">WenWen Superpowers</div>
        <h1>文文超能力</h1>
        <p class="lead">文文的固定主入口。互動式 PPT 作品與文文技能列表都從這裡進入；之後更新簡報或技能時，都會附上這個主網頁連結。</p>
      </header>

      <section class="grid" aria-label="主要入口">
        <a class="card" href="./ppt-catalog/">
          <div>
            <div class="icon" aria-hidden="true">🎞️</div>
            <h2>互動式 PPT</h2>
            <p>所有 HTML 投影片的主目錄列表。排序規則：最新產生 / 更新的簡報在最上面，往下由新到舊。</p>
          </div>
          <span class="cta">進入 PPT 主目錄</span>
        </a>

        <a class="card" href="./wenwen-skills/">
          <div>
            <div class="icon" aria-hidden="true">🧰</div>
            <h2>文文的技能</h2>
            <p>查看目前可用、已安裝與未來可能補強的文文技能清單，每個技能都有中文說明。</p>
          </div>
          <span class="cta">查看技能列表</span>
        </a>
      </section>

      <footer>公開 GitHub Pages 頁面只放可公開展示內容；機密資料、Token、密碼、客戶內部文件不放在此處。最後更新：2026-05-17</footer>
    </div>
  </main>
</body>
</html>
