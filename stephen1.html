<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>stephen1 - 貪吃蛇</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Press Start 2P',monospace;color:white}
#app{display:flex;flex-direction:column;height:100vh;align-items:center}
#topbar{display:flex;gap:6px;padding:8px;width:100%;justify-content:center}
.ibox{background:rgba(30,30,30,0.92);border:1.5px solid #555;border-radius:8px;padding:5px 8px;text-align:center;flex:1;max-width:80px}
.ilabel{font-size:5px;color:#aaa;letter-spacing:1px}
.ival{font-size:11px;margin-top:3px}
#board{display:block;border:2px solid #444;flex:1}
#controls{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:10px;width:100%;max-width:300px}
.cbtn{background:rgba(39,174,96,0.85);border:2px solid #555;border-radius:12px;color:white;font-size:22px;padding:16px 0;cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:center}
.cbtn:active{background:rgba(20,140,60,0.9);transform:scale(0.93)}
.cbtn.empty{background:transparent;border:none}
.cbtn.pause{background:rgba(50,100,200,0.85);font-size:11px;font-family:'Press Start 2P',monospace}
#gameOver{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:99;font-size:14px}
.gobtn{padding:12px 24px;font-family:'Press Start 2P',monospace;font-size:9px;background:rgba(39,174,96,0.9);color:white;border:2px solid #fff;border-radius:8px;cursor:pointer}
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="ibox"><div class="ilabel">分數</div><div class="ival" id="score">0</div></div>
    <div class="ibox"><div class="ilabel">最高</div><div class="ival" id="high">0</div></div>
    <div class="ibox"><div class="ilabel">長度</div><div class="ival" id="length">3</div></div>
    <div class="ibox"><div class="ilabel">速度</div><div class="ival" id="speed">1</div></div>
  </div>
  <canvas id="board"></canvas>
  <div id="controls">
    <div class="cbtn empty"></div>
    <div class="cbtn" id="btnUp">↑</div>
    <div class="cbtn pause" id="btnPause">暫停</div>
    <div class="cbtn" id="btnLeft">←</div>
    <div class="cbtn" id="btnDown">↓</div>
    <div class="cbtn" id="btnRight">→</div>
  </div>
</div>
<div id="gameOver">
  <div>GAME OVER</div>
  <div id="finalScore" style="font-size:9px;color:#7fff7f;margin-top:4px"></div>
  <button class="gobtn" onclick="startGame()">再玩一次</button>
</div>

<script>
const bg=new Image();bg.src='bg_image.jpg';
const canvas=document.getElementById('board');
const ctx=canvas.getContext('2d');

function resize(){
  const topH=56,ctrlH=140;
  const availH=window.innerHeight-topH-ctrlH-20;
  const availW=window.innerWidth-16;
  const BLOCK=Math.floor(Math.min(availW/20,availH/20));
  return BLOCK<14?14:BLOCK;
}
let BLOCK=resize(),COLS=20,ROWS=20;
canvas.width=COLS*BLOCK;canvas.height=ROWS*BLOCK;

let snake,dir,nextDir,food,bonus,score,highScore=0,gameRunning,paused,timer,frame=0;

function randPos(){return{x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
function placeFood(){let p;do{p=randPos();}while(snake.some(s=>s.x===p.x&&s.y===p.y));return p;}

function startGame(){
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  food=placeFood();bonus=null;score=0;paused=false;gameRunning=true;frame=0;
  document.getElementById('gameOver').style.display='none';
  clearInterval(timer);updateInfo();
  timer=setInterval(gameLoop,130);
}
function endGame(){
  gameRunning=false;clearInterval(timer);
  if(score>highScore)highScore=score;
  document.getElementById('finalScore').textContent='分數: '+score;
  document.getElementById('gameOver').style.display='flex';
  updateInfo();
}
function togglePause(){if(!gameRunning)return;paused=!paused;}
function updateInfo(){
  document.getElementById('score').textContent=score;
  document.getElementById('high').textContent=highScore;
  document.getElementById('length').textContent=snake.length;
  document.getElementById('speed').textContent=Math.floor(snake.length/5)+1;
}
function gameLoop(){
  if(!gameRunning||paused)return;
  frame++;dir=nextDir;
  const head={x:(snake[0].x+dir.x+COLS)%COLS,y:(snake[0].y+dir.y+ROWS)%ROWS};
  if(snake.some(s=>s.x===head.x&&s.y===head.y)){endGame();return;}
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y){score+=10;food=placeFood();
    if(!bonus&&Math.random()<0.3){let p;do{p=randPos();}while(snake.some(s=>s.x===p.x&&s.y===p.y));bonus={...p,t:80};}
  } else if(bonus&&head.x===bonus.x&&head.y===bonus.y){score+=50;bonus=null;}
  else snake.pop();
  if(bonus){bonus.t--;if(bonus.t<=0)bonus=null;}
  const spd=Math.floor(snake.length/5)+1;
  clearInterval(timer);timer=setInterval(gameLoop,Math.max(55,130-spd*12));
  updateInfo();draw();
}
function draw(){
  if(bg.complete&&bg.naturalWidth>0){ctx.drawImage(bg,0,0,canvas.width,canvas.height);ctx.fillStyle='rgba(0,0,0,0.15)';ctx.fillRect(0,0,canvas.width,canvas.height);}
  else{ctx.fillStyle='#111';ctx.fillRect(0,0,canvas.width,canvas.height);}
  ctx.strokeStyle='rgba(255,255,255,0.05)';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)ctx.strokeRect(c*BLOCK,r*BLOCK,BLOCK,BLOCK);
  snake.forEach((s,i)=>{
    ctx.fillStyle=i===0?'#00ff44':`hsl(${130-i/snake.length*30},90%,${55-i/snake.length*15}%)`;
    ctx.beginPath();ctx.roundRect(s.x*BLOCK+1,s.y*BLOCK+1,BLOCK-2,BLOCK-2,i===0?4:2);ctx.fill();
    if(i===0){ctx.fillStyle='rgba(255,255,255,0.4)';ctx.fillRect(s.x*BLOCK+3,s.y*BLOCK+3,4,2);}
  });
  ctx.fillStyle='#ff4444';
  ctx.beginPath();ctx.arc(food.x*BLOCK+BLOCK/2,food.y*BLOCK+BLOCK/2,BLOCK/2-2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,200,200,0.6)';
  ctx.beginPath();ctx.arc(food.x*BLOCK+BLOCK/2-2,food.y*BLOCK+BLOCK/2-2,2,0,Math.PI*2);ctx.fill();
  if(bonus){
    const pulse=Math.sin(frame*0.25)*0.4+0.6;
    ctx.save();ctx.globalAlpha=pulse;ctx.fillStyle='#ffd700';
    ctx.beginPath();
    const cx=bonus.x*BLOCK+BLOCK/2,cy=bonus.y*BLOCK+BLOCK/2;
    for(let i=0;i<5;i++){const a=i*Math.PI*2/5-Math.PI/2,r=i%2===0?BLOCK/2-1:BLOCK/4;i===0?ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r):ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);}
    ctx.closePath();ctx.fill();ctx.restore();
  }
}

function setDir(d){
  if(!gameRunning||paused)return;
  if(!(d.x===-dir.x&&d.y===-dir.y))nextDir=d;
}
function addBtn(id,fn){
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();fn();},{passive:false});
  el.addEventListener('mousedown',e=>{e.preventDefault();fn();});
}
addBtn('btnUp',()=>setDir({x:0,y:-1}));
addBtn('btnDown',()=>setDir({x:0,y:1}));
addBtn('btnLeft',()=>setDir({x:-1,y:0}));
addBtn('btnRight',()=>setDir({x:1,y:0}));
addBtn('btnPause',togglePause);

// 滑動手勢
let tx=0,ty=0;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)){setDir(dx>0?{x:1,y:0}:{x:-1,y:0});}
  else if(Math.abs(dy)>10){setDir(dy>0?{x:0,y:1}:{x:0,y:-1});}
},{passive:true});

bg.onload=()=>startGame();
if(bg.complete)startGame();
</script>
</body>
</html>
