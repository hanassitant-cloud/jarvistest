<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>貪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    color: white;
    user-select: none;
    touch-action: none;
  }
  #top-bar {
    display: flex;
    justify-content: space-around;
    width: 100%;
    max-width: 420px;
    padding: 10px;
    gap: 8px;
  }
  .stat-box {
    background: rgba(0,0,0,0.5);
    border-radius: 8px;
    padding: 6px 16px;
    text-align: center;
    flex: 1;
  }
  .stat-label { font-size: 10px; color: #aaa; text-transform: uppercase; }
  .stat-value { font-size: 22px; font-weight: bold; }
  #canvas-wrap {
    position: relative;
  }
  canvas {
    display: block;
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 6px;
  }
  #overlay {
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.65);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
  }
  #overlay h2 { font-size: 32px; margin-bottom: 10px; }
  #overlay p  { font-size: 14px; color: #ccc; margin-bottom: 20px; }
  #btn-start {
    background: #27ae60;
    border: none; border-radius: 8px;
    color: white; font-size: 18px;
    padding: 12px 32px; cursor: pointer;
  }
  #controls {
    display: grid;
    grid-template-columns: repeat(3, 72px);
    grid-template-rows: repeat(2, 64px);
    gap: 8px;
    margin-top: 14px;
  }
  .btn {
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.3);
    border-radius: 12px;
    color: white;
    font-size: 26px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { background: rgba(255,255,255,0.35); }
  #btn-up    { grid-column: 2; grid-row: 1; }
  #btn-left  { grid-column: 1; grid-row: 2; }
  #btn-down  { grid-column: 2; grid-row: 2; }
  #btn-right { grid-column: 3; grid-row: 2; }
</style>
</head>
<body>
<div id="top-bar">
  <div class="stat-box"><div class="stat-label">分數</div><div class="stat-value" id="score">0</div></div>
  <div class="stat-box"><div class="stat-label">最高分</div><div class="stat-value" id="best">0</div></div>
  <div class="stat-box"><div class="stat-label">等級</div><div class="stat-value" id="level">1</div></div>
</div>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
  <div id="overlay">
    <h2 id="ov-title">貪吃蛇</h2>
    <p id="ov-msg">點擊開始遊戲</p>
    <button id="btn-start">開始</button>
  </div>
</div>

<div id="controls">
  <div class="btn" id="btn-up">↑</div>
  <div class="btn" id="btn-left">←</div>
  <div class="btn" id="btn-down">↓</div>
  <div class="btn" id="btn-right">→</div>
</div>

<script>
const COLS = 20, ROWS = 20;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let CELL;
function resize() {
  const maxW = Math.min(window.innerWidth, 420) - 8;
  const maxH = window.innerHeight - 220;
  CELL = Math.floor(Math.min(maxW / COLS, maxH / ROWS));
  CELL = Math.max(CELL, 14);
  canvas.width  = CELL * COLS;
  canvas.height = CELL * ROWS;
}
resize();
window.addEventListener('resize', () => { resize(); });

let snake, dir, nextDir, food, score, best = 0, level, speed, timer, running = false, dead = false;

function startGame() {
  snake = [{x:10, y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1, y:0};
  nextDir = {x:1, y:0};
  score = 0; level = 1; speed = 350;
  placeFood();
  dead = false; running = true;
  document.getElementById('overlay').style.display = 'none';
  clearInterval(timer);
  timer = setInterval(step, speed);
  updateStats();
}

function placeFood() {
  let pos;
  do { pos = {x: Math.floor(Math.random()*COLS), y: Math.floor(Math.random()*ROWS)}; }
  while (snake.some(s => s.x===pos.x && s.y===pos.y));
  food = pos;
}

function step() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    gameOver(); return;
  }
  snake.unshift(head);
  if (head.x===food.x && head.y===food.y) {
    score += 10 * level;
    if (score > best) best = score;
    level = Math.floor(score / 100) + 1;
    speed = Math.max(80, 350 - (level-1)*25);
    clearInterval(timer);
    timer = setInterval(step, speed);
    placeFood();
    updateStats();
  } else {
    snake.pop();
  }
  draw();
}

function gameOver() {
  running = false; dead = true;
  clearInterval(timer);
  if (score > best) best = score;
  const ov = document.getElementById('overlay');
  document.getElementById('ov-title').textContent = 'GAME OVER';
  document.getElementById('ov-msg').textContent = `分數：${score}`;
  document.getElementById('btn-start').textContent = '再玩一次';
  ov.style.display = 'flex';
  updateStats();
}

function updateStats() {
  document.getElementById('score').textContent = score;
  document.getElementById('best').textContent = best;
  document.getElementById('level').textContent = level;
}

function draw() {
  const W = canvas.width, H = canvas.height;
  // background image
  if (bgImg.complete && bgImg.naturalWidth) {
    const iw = bgImg.naturalWidth, ih = bgImg.naturalHeight;
    const scale = Math.max(W/iw, H/ih);
    const sw = iw*scale, sh = ih*scale;
    ctx.drawImage(bgImg, (W-sw)/2, (H-sh)/2, sw, sh);
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.fillRect(0,0,W,H);
  } else {
    ctx.fillStyle = '#1a3a1a';
    ctx.fillRect(0,0,W,H);
  }

  // grid (subtle)
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 0.5;
  for (let x=0;x<=COLS;x++) { ctx.beginPath(); ctx.moveTo(x*CELL,0); ctx.lineTo(x*CELL,H); ctx.stroke(); }
  for (let y=0;y<=ROWS;y++) { ctx.beginPath(); ctx.moveTo(0,y*CELL); ctx.lineTo(W,y*CELL); ctx.stroke(); }

  // food
  ctx.fillStyle = '#ff3b3b';
  ctx.shadowColor = '#ff0000';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(food.x*CELL+CELL/2, food.y*CELL+CELL/2, CELL/2-2, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // snake
  snake.forEach((s, i) => {
    const ratio = 1 - i/snake.length*0.5;
    ctx.fillStyle = i===0 ? '#00ff88' : `rgba(0,${Math.floor(200*ratio)},${Math.floor(100*ratio)},0.92)`;
    ctx.shadowColor = i===0 ? '#00ff88' : 'transparent';
    ctx.shadowBlur = i===0 ? 8 : 0;
    const pad = i===0 ? 1 : 2;
    ctx.beginPath();
    ctx.roundRect(s.x*CELL+pad, s.y*CELL+pad, CELL-pad*2, CELL-pad*2, 4);
    ctx.fill();
  });
  ctx.shadowBlur = 0;
}

// Controls
document.getElementById('btn-start').addEventListener('pointerdown', e => { e.preventDefault(); startGame(); });
document.getElementById('btn-up').addEventListener('pointerdown',    e => { e.preventDefault(); if(dir.y!==1)  nextDir={x:0,y:-1}; });
document.getElementById('btn-down').addEventListener('pointerdown',  e => { e.preventDefault(); if(dir.y!==-1) nextDir={x:0,y:1};  });
document.getElementById('btn-left').addEventListener('pointerdown',  e => { e.preventDefault(); if(dir.x!==1)  nextDir={x:-1,y:0}; });
document.getElementById('btn-right').addEventListener('pointerdown', e => { e.preventDefault(); if(dir.x!==-1) nextDir={x:1,y:0};  });

document.addEventListener('keydown', e => {
  if (!running) return;
  switch(e.key) {
    case 'ArrowUp':    if(dir.y!==1)  nextDir={x:0,y:-1}; break;
    case 'ArrowDown':  if(dir.y!==-1) nextDir={x:0,y:1};  break;
    case 'ArrowLeft':  if(dir.x!==1)  nextDir={x:-1,y:0}; break;
    case 'ArrowRight': if(dir.x!==-1) nextDir={x:1,y:0};  break;
  }
  e.preventDefault();
});

// Swipe
let tx=0, ty=0;
canvas.addEventListener('touchstart', e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; e.preventDefault(); },{passive:false});
canvas.addEventListener('touchend', e=>{
  if(!running) return;
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)) { if(dx>0&&dir.x!==-1) nextDir={x:1,y:0}; else if(dx<0&&dir.x!==1) nextDir={x:-1,y:0}; }
  else { if(dy>0&&dir.y!==-1) nextDir={x:0,y:1}; else if(dy<0&&dir.y!==1) nextDir={x:0,y:-1}; }
  e.preventDefault();
},{passive:false});

draw();
</script>
