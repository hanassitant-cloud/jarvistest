<!doctype html>
<html lang="zh-Hant">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>所有網址列表｜文文超能力</title><style>
    :root{--bg:#030712;--ink:#f8fafc;--muted:#bfd2e8;--line:rgba(148,163,184,.24);--panel:rgba(16,27,51,.72);--panel2:rgba(18,24,41,.86);--brand:#67e8f9;--brand2:#86efac;--soft:#8aa5bf}
    *{box-sizing:border-box}
    body{margin:0;min-height:100vh;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC","PingFang TC",Arial,sans-serif;background:radial-gradient(circle at 20% 0%,rgba(96,165,250,.34),transparent 34rem),radial-gradient(circle at 85% 10%,rgba(52,211,153,.2),transparent 30rem),linear-gradient(145deg,#07162d 0%,#081024 42%,#030712 100%)}
    body:before{content:"";position:fixed;inset:0;pointer-events:none;background:linear-gradient(180deg,rgba(255,255,255,.05),transparent 28%),repeating-linear-gradient(90deg,rgba(255,255,255,.025) 0 1px,transparent 1px 96px);mask-image:linear-gradient(180deg,#000,transparent 78%)}
    .wrap{width:min(1180px,100%);margin:0 auto;padding:44px 20px 70px;position:relative}
    .back{display:inline-flex;align-items:center;gap:10px;text-decoration:none;color:#04111f;background:linear-gradient(135deg,var(--brand),var(--brand2));border-radius:999px;padding:12px 18px;font-weight:950;box-shadow:0 18px 45px rgba(45,212,191,.18)}
    .back span{width:30px;height:30px;border-radius:11px;display:grid;place-items:center;background:rgba(255,255,255,.58);font-size:18px}
    header{margin:34px 0 24px}
    .eyebrow{font-size:13px;color:#a7f3d0;letter-spacing:.08em;text-transform:uppercase;margin:0 0 10px;font-weight:900}
    h1{font-size:clamp(36px,6vw,72px);line-height:1.02;margin:0 0 14px;letter-spacing:0;text-shadow:0 18px 54px rgba(0,0,0,.36)}
    .lead{max-width:880px;color:var(--muted);font-size:18px;line-height:1.65;margin:0}
    .toolbar{display:flex;gap:12px;flex-wrap:wrap;margin:24px 0;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:12px;backdrop-filter:blur(18px)}
    input,select{border:1px solid var(--line);border-radius:999px;background:rgba(255,255,255,.08);color:#fff;padding:12px 14px;font-size:15px}
    input{flex:1;min-width:240px}input::placeholder{color:#8aa5bf}select{min-width:170px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(100%,320px),1fr));gap:16px}
    .item{display:flex;flex-direction:column;min-height:258px;padding:22px;border-radius:24px;border:1px solid var(--line);background:linear-gradient(150deg,var(--panel),var(--panel2));box-shadow:0 22px 60px rgba(0,0,0,.24);backdrop-filter:blur(18px)}
    .meta{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:14px}.tag{background:rgba(103,232,249,.14);color:#a7f3d0;border:1px solid rgba(103,232,249,.24);border-radius:999px;padding:6px 10px;font-weight:900;font-size:13px}time{color:var(--soft);font-weight:850;font-family:ui-monospace,SFMono-Regular,Menlo,monospace}
    h2{font-size:22px;line-height:1.22;margin:0 0 10px}.desc{color:var(--muted);line-height:1.55;margin:0 0 14px}.note{color:var(--soft);font-size:13px;margin:auto 0 16px}
    .actions{display:flex;gap:10px;flex-wrap:wrap}.open{display:inline-flex;align-items:center;justify-content:center;text-decoration:none;color:#04111f;background:linear-gradient(135deg,var(--brand),var(--brand2));border-radius:999px;padding:12px 16px;font-weight:950}.empty{border:1px dashed rgba(103,232,249,.4);border-radius:24px;padding:24px;color:var(--muted);background:rgba(103,232,249,.08)}
    footer{margin-top:34px;color:var(--soft);font-size:13px;line-height:1.6}
    @media(max-width:620px){.wrap{padding:34px 14px 44px}.toolbar{align-items:stretch}input,select{width:100%;min-width:0}.back{width:100%;justify-content:center}.item{min-height:230px}}
</style></head>
<body><main class="wrap"><a class="back" href="../"><span aria-hidden="true">↩</span>返回文文超能力</a><header><p class="eyebrow">Public URL Directory</p><h1>所有網址列表</h1><p class="lead">這裡會整理 Jason 指定要維護的對外網站、官方帳號、社群連結與相關入口。完整列表等 Jason 下一則提供後補上，並依分類與更新時間整理。</p></header><div class="empty"><strong>等待完整列表</strong><br>Jason 提供所有網址後，我會把每個項目做成可搜尋卡片，包含名稱、分類、網址、用途說明與更新時間。</div><footer>固定入口：/url-list/｜最後更新：2026-05-17</footer></main></body></html>
