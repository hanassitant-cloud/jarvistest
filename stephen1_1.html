<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>stephen1 - 貪吃蛇</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Press Start 2P',monospace;
  background:#000;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  padding:10px;
  color:white;
}
.top-bar{
  display:flex;gap:16px;margin-bottom:10px;
  width:100%;max-width:540px;justify-content:center;
}
.info-box{
  background:rgba(40,40,40,0.9);border:2px solid #555;
  border-radius:8px;padding:6px 14px;text-align:center;min-width:80px;
}
.info-label{font-size:7px;color:#aaa;margin-bottom:4px;letter-spacing:1px;}
.info-val{font-size:13px;color:white;}
.game-area{display:flex;gap:12px;align-items:flex-start;}
.canvas-wrap{position:relative;border:3px solid #555;}
canvas#board{display:block;}
.side{display:flex;flex-direction:column;gap:10px;width:100px;}
.side-box{background:rgba(40,40,40,0.9);border:2px solid #555;border-radius:8px;padding:8px;text-align:center;}
.btn{
  width:100%;padding:8px 4px;font-family:'Press Start 2P',monospace;font-size:7px;
  cursor:pointer;border:2px solid #555;border-radius:6px;margin-bottom:6px;
  background:rgba(39,174,96,0.85);color:white;transition:all 0.1s;
}
.btn:hover{background:rgba(20,140,60,0.9);}
.controls{font-size:6px;color:#888;line-height:2.2;}
#gameOver{
  display:none;position:absolute;inset:0;
  background:rgba(0,0,0,0.75);color:white;font-size:13px;
  flex-direction:column;align-items:center;justify-content:center;gap:12px;z-index:20;
}
</style>
</head>
<body>
<div class="top-bar">
  <div class="info-box"><div class="info-label">分數</div><div class="info-val" id="score">0</div></div>
  <div class="info-box"><div class="info-label">最高</div><div class="info-val" id="high">0</div></div>
  <div class="info-box"><div class="info-label">長度</div><div class="info-val" id="length">3</div></div>
  <div class="info-box"><div class="info-label">速度</div><div class="info-val" id="speed">1</div></div>
</div>
<div class="game-area">
  <div class="canvas-wrap">
    <canvas id="board"></canvas>
    <div id="gameOver">
      <div>GAME OVER</div>
      <div id="finalScore" style="font-size:8px;color:#7fff7f;margin-top:4px"></div>
      <button class="btn" style="width:auto;padding:8px 16px;margin-top:8px" onclick="startGame()">再玩一次</button>
    </div>
  </div>
  <div class="side">
    <div class="side-box">
      <button class="btn" onclick="startGame()">開始</button>
      <button class="btn" onclick="togglePause()">暫停</button>
      <div class="controls">
        <div>↑↓←→</div>
        <div>WASD</div>
        <div>空白 暫停</div>
      </div>
    </div>
  </div>
</div>

<script>
const COLS=24,ROWS=24,BLOCK=20;
const canvas=document.getElementById('board');
const ctx=canvas.getContext('2d');
canvas.width=COLS*BLOCK; canvas.height=ROWS*BLOCK;

const bg=new Image();
bg.src='bg_image.jpg';

let snake,dir,nextDir,food,bonus,score,highScore=0,gameRunning,paused,timer,frame=0;

function randPos(){return{x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)};}
function placeFood(){
  let pos;
  do{pos=randPos();}while(snake.some(s=>s.x===pos.x&&s.y===pos.y));
  return pos;
}

function startGame(){
  snake=[{x:12,y:12},{x:11,y:12},{x:10,y:12}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  food=placeFood();bonus=null;
  score=0;paused=false;gameRunning=true;frame=0;
  document.getElementById('gameOver').style.display='none';
  clearInterval(timer);
  updateInfo();
  timer=setInterval(gameLoop,130);
}

function endGame(){
  gameRunning=false;clearInterval(timer);
  if(score>highScore)highScore=score;
  document.getElementById('finalScore').textContent='SCORE: '+score;
  document.getElementById('gameOver').style.display='flex';
  updateInfo();
}
function togglePause(){if(!gameRunning)return;paused=!paused;}

function updateInfo(){
  document.getElementById('score').textContent=score;
  document.getElementById('high').textContent=highScore;
  document.getElementById('length').textContent=snake.length;
  document.getElementById('speed').textContent=Math.floor(snake.length/5)+1;
}

function gameLoop(){
  if(!gameRunning||paused)return;
  frame++;
  dir=nextDir;
  const head={x:(snake[0].x+dir.x+COLS)%COLS,y:(snake[0].y+dir.y+ROWS)%ROWS};
  if(snake.some(s=>s.x===head.x&&s.y===head.y)){endGame();return;}
  snake.unshift(head);
  let ate=false;
  if(head.x===food.x&&head.y===food.y){score+=10;ate=true;food=placeFood();
    if(!bonus&&Math.random()<0.3){let p;do{p=randPos();}while(snake.some(s=>s.x===p.x&&s.y===p.y));bonus={...p,t:80};}
  } else if(bonus&&head.x===bonus.x&&head.y===bonus.y){score+=50;ate=true;bonus=null;}
  else snake.pop();
  if(bonus){bonus.t--;if(bonus.t<=0)bonus=null;}
  const spd=Math.floor(snake.length/5)+1;
  clearInterval(timer);timer=setInterval(gameLoop,Math.max(55,130-spd*12));
  updateInfo();draw();
}

function draw(){
  // 照片背景
  if(bg.complete&&bg.naturalWidth>0){
    ctx.drawImage(bg,0,0,canvas.width,canvas.height);
    ctx.fillStyle='rgba(0,0,0,0.18)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
  } else {
    ctx.fillStyle='#111';ctx.fillRect(0,0,canvas.width,canvas.height);
  }
  // 格線
  ctx.strokeStyle='rgba(255,255,255,0.06)';
  for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++) ctx.strokeRect(c*BLOCK,r*BLOCK,BLOCK,BLOCK);
  // 蛇
  snake.forEach((s,i)=>{
    if(i===0){
      ctx.fillStyle='#00ff44';
    } else {
      const ratio=i/snake.length;
      ctx.fillStyle=`hsl(${130-ratio*30},90%,${55-ratio*15}%)`;
    }
    ctx.beginPath();
    ctx.roundRect(s.x*BLOCK+1,s.y*BLOCK+1,BLOCK-2,BLOCK-2,i===0?5:3);
    ctx.fill();
    if(i===0){
      ctx.fillStyle='rgba(255,255,255,0.4)';
      ctx.fillRect(s.x*BLOCK+3,s.y*BLOCK+3,5,3);
    }
  });
  // 食物
  ctx.fillStyle='#ff4444';
  ctx.beginPath();ctx.arc(food.x*BLOCK+BLOCK/2,food.y*BLOCK+BLOCK/2,BLOCK/2-2,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#cc0000';
  ctx.beginPath();ctx.arc(food.x*BLOCK+BLOCK/2,food.y*BLOCK+BLOCK/2,BLOCK/2-5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,200,200,0.6)';
  ctx.beginPath();ctx.arc(food.x*BLOCK+BLOCK/2-3,food.y*BLOCK+BLOCK/2-3,3,0,Math.PI*2);ctx.fill();
  // 獎勵星星
  if(bonus){
    const pulse=Math.sin(frame*0.25)*0.4+0.6;
    ctx.save();
    ctx.globalAlpha=pulse;
    ctx.fillStyle='#ffd700';
    ctx.beginPath();
    const cx=bonus.x*BLOCK+BLOCK/2,cy=bonus.y*BLOCK+BLOCK/2;
    for(let i=0;i<5;i++){
      const a=i*Math.PI*2/5-Math.PI/2;
      const r=i%2===0?BLOCK/2-1:BLOCK/4;
      i===0?ctx.moveTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r):ctx.lineTo(cx+Math.cos(a)*r,cy+Math.sin(a)*r);
    }
    ctx.closePath();ctx.fill();
    ctx.restore();
  }
}

document.addEventListener('keydown',e=>{
  if(e.key===' '){togglePause();e.preventDefault();return;}
  if(!gameRunning||paused)return;
  const map={ArrowUp:{x:0,y:-1},ArrowDown:{x:0,y:1},ArrowLeft:{x:-1,y:0},ArrowRight:{x:1,y:0},
    w:{x:0,y:-1},s:{x:0,y:1},a:{x:-1,y:0},d:{x:1,y:0}};
  const nd=map[e.key];
  if(nd&&!(nd.x===-dir.x&&nd.y===-dir.y)){nextDir=nd;e.preventDefault();}
});

bg.onload=()=>startGame();
if(bg.complete) startGame();
</script>
</body>
</html>
