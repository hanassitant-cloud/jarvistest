    font-family: Arial, sans-serif;
    overflow: hidden;
    touch-action: none;

  #header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    background: rgba(0,0,0,0.55);
    backdrop-filter: blur(4px);
  }
  #header h1 { color: #fff; font-size: 20px; letter-spacing: 2px; }
  #score-box { color: #ffe066; font-size: 16px; font-weight: bold; }

    grid-template-columns: 1fr 1fr 1fr;

    margin-top: 10px;
  }

    border: 2px solid rgba(255,255,255,0.5);
    border-radius: 50%;
    color: white;
    font-size: 24px;
    height: 60px;
    width: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    cursor: pointer;
    backdrop-filter: blur(3px);
    margin: auto;
  }
  .dbtn:active { background: rgba(255,255,255,0.25); }
  #dbtn-up    { grid-column: 2; grid-row: 1; }
  #dbtn-left  { grid-column: 1; grid-row: 2; }
  #dbtn-center{ grid-column: 2; grid-row: 2; background: rgba(255,200,0,0.3); font-size:14px; border-radius: 50%; }
  #dbtn-right { grid-column: 3; grid-row: 2; }
  #dbtn-down  { grid-column: 2; grid-row: 3; }
  #overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10;
  }
  #overlay h2 { color: #fff; font-size: 28px; margin-bottom: 12px; }
  #overlay p { color: #ffe066; font-size: 18px; margin-bottom: 24px; text-align:center; }

    padding: 12px 36px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    background: linear-gradient(135deg, #56ab2f, #a8e063);
    color: #222;
    font-weight: bold;
    cursor: pointer;
    box-shadow: 0 4px 16px rgba(0,0,0,0.4);
  }
  #high-score { color: #aaffaa; font-size: 14px; margin-top: 8px; }

<body>
<div id="header">
  <h1>貪吃蛇</h1>
  <div id="score-box">分數: <span id="score">0</span> &nbsp; 最高: <span id="hi">0</span></div>
</div>
<div id="canvas-wrapper">
  <canvas id="snake-board"></canvas>
</div>
<div id="dpad">
  <div class="dbtn" id="dbtn-up">▲</div>
  <div class="dbtn" id="dbtn-left">◀</div>
  <div class="dbtn" id="dbtn-center" id="dbtn-pause">II</div>
  <div class="dbtn" id="dbtn-right">▶</div>
  <div class="dbtn" id="dbtn-down">▼</div>
</div>
<div id="overlay">
  <h2>🐍 貪吃蛇</h2>
  <p>滑動或使用方向鍵控制方向<br>吃食物讓蛇變長！</p>
  <button id="start-btn">開始遊戲</button>
</div>

<script>
const canvas = document.getElementById('snake-board');
const ctx = canvas.getContext('2d');
let CELL, COLS, ROWS;

function resize() {
  const maxW = Math.min(window.innerWidth - 16, 360);
  const maxH = window.innerHeight - 230;
  const size = Math.min(maxW, maxH);
  COLS = 20; ROWS = 20;
  CELL = Math.floor(size / COLS);
  canvas.width = CELL * COLS;
  canvas.height = CELL * ROWS;
}
resize();

let snake, dir, nextDir, food, score, hiScore=0, gameOver, interval, paused;

function randFood() {
  let pos;
  do { pos={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS)}; }
  while(snake.some(s=>s.x===pos.x&&s.y===pos.y));
  return pos;
}

function startGame() {
  snake=[{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir={x:1,y:0}; nextDir={x:1,y:0};
  score=0; gameOver=false; paused=false;
  food=randFood();
  document.getElementById('score').textContent=0;
  document.getElementById('overlay').style.display='none';
  clearInterval(interval);
  interval=setInterval(tick,120);
  draw();
}

function tick() {
  if(paused||gameOver) return;
  dir=nextDir;
  const head={x:snake[0].x+dir.x, y:snake[0].y+dir.y};
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS||snake.some(s=>s.x===head.x&&s.y===head.y)) {
    endGame(); return;
  }
  snake.unshift(head);
  if(head.x===food.x&&head.y===food.y) {
    score+=10; document.getElementById('score').textContent=score;
    if(score>hiScore){hiScore=score;document.getElementById('hi').textContent=hiScore;}
    food=randFood();
  } else { snake.pop(); }
  draw();
}

function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  // grid
  ctx.strokeStyle='rgba(255,255,255,0.05)';
  for(let x=0;x<COLS;x++) for(let y=0;y<ROWS;y++) ctx.strokeRect(x*CELL,y*CELL,CELL,CELL);
  // food
  const fx=food.x*CELL, fy=food.y*CELL;
  ctx.fillStyle='#ff4757';
  ctx.beginPath();
  ctx.arc(fx+CELL/2,fy+CELL/2,CELL/2-2,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='rgba(255,150,150,0.7)';
  ctx.beginPath();
  ctx.arc(fx+CELL/2-2,fy+CELL/2-2,CELL/5,0,Math.PI*2);
  ctx.fill();
  // snake
  snake.forEach((s,i)=>{
    const g=ctx.createLinearGradient(s.x*CELL,s.y*CELL,(s.x+1)*CELL,(s.y+1)*CELL);
    g.addColorStop(0,i===0?'#2ed573':'#7bed9f');
    g.addColorStop(1,i===0?'#1e9950':'#55c97a');
    ctx.fillStyle=g;
    ctx.beginPath();
    ctx.roundRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2,4);
    ctx.fill();
    if(i===0) {
      ctx.fillStyle='#000';
      const ex=dir.x===1?0.7:dir.x===-1?0.3:0.3;
      const ey=dir.y===1?0.7:dir.y===-1?0.3:0.3;
      ctx.beginPath();ctx.arc(s.x*CELL+CELL*ex,s.y*CELL+CELL*ey,2,0,Math.PI*2);ctx.fill();
      const ex2=dir.x===1?0.7:dir.x===-1?0.3:0.7;
      const ey2=dir.y===1?0.3:dir.y===-1?0.7:0.3;
      ctx.beginPath();ctx.arc(s.x*CELL+CELL*ex2,s.y*CELL+CELL*ey2,2,0,Math.PI*2);ctx.fill();
    }
  });
}

function endGame() {
  clearInterval(interval); gameOver=true;
  const ov=document.getElementById('overlay');
  ov.querySelector('h2').textContent='遊戲結束！';
  ov.querySelector('p').textContent='分數: '+score+'\n最高分: '+hiScore;
  ov.querySelector('button').textContent='再玩一次';
  ov.style.display='flex';
}

document.getElementById('start-btn').addEventListener('click',startGame);

function setDir(dx,dy) {
  if(dir.x===0&&dx!==0){nextDir={x:dx,y:0};}
  else if(dir.y===0&&dy!==0){nextDir={x:0,y:dy};}
}
document.getElementById('dbtn-up').addEventListener('touchstart',e=>{e.preventDefault();setDir(0,-1);},{passive:false});
document.getElementById('dbtn-down').addEventListener('touchstart',e=>{e.preventDefault();setDir(0,1);},{passive:false});
document.getElementById('dbtn-left').addEventListener('touchstart',e=>{e.preventDefault();setDir(-1,0);},{passive:false});
document.getElementById('dbtn-right').addEventListener('touchstart',e=>{e.preventDefault();setDir(1,0);},{passive:false});
document.getElementById('dbtn-up').addEventListener('click',()=>setDir(0,-1));
document.getElementById('dbtn-down').addEventListener('click',()=>setDir(0,1));
document.getElementById('dbtn-left').addEventListener('click',()=>setDir(-1,0));
document.getElementById('dbtn-right').addEventListener('click',()=>setDir(1,0));

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowUp') setDir(0,-1);
  else if(e.key==='ArrowDown') setDir(0,1);
  else if(e.key==='ArrowLeft') setDir(-1,0);
  else if(e.key==='ArrowRight') setDir(1,0);
});

let tx,ty;
canvas.addEventListener('touchstart',e=>{tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
canvas.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-tx;
  const dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)>Math.abs(dy)){
    if(dx<-20)setDir(-1,0); else if(dx>20)setDir(1,0);
  } else {
    if(dy<-20)setDir(0,-1); else if(dy>20)setDir(0,1);
  }
},{passive:true});

window.addEventListener('resize',()=>{resize();draw();});
</script>
