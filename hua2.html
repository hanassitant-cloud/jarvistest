<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>貪吃蛇</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-image: url('bg_image.jpg');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    font-family: 'Arial', sans-serif;
  }
  .overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.45);
    z-index: 0;
  }
  .container {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }
  .topbar {
    display: flex;
    gap: 32px;
    background: rgba(0,0,0,0.65);
    border: 2px solid rgba(255,255,255,0.35);
    border-radius: 10px;
    padding: 12px 36px;
    color: #fff;
    align-items: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }
  .topbar h2 {
    font-size: 24px;
    color: #66ff88;
    text-shadow: 0 0 10px #00ff44;
    letter-spacing: 3px;
    margin-right: 16px;
  }
  .stat { text-align: center; }
  .stat .label { font-size: 12px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
  .stat .value { font-size: 26px; font-weight: bold; color: #66ff88; }
  canvas {
    border: 3px solid rgba(255,255,255,0.7);
    border-radius: 6px;
    box-shadow: 0 0 40px rgba(0,0,0,0.6);
    background: rgba(0,0,0,0.55);
    display: block;
  }
  .controls-bar {
    display: flex;
    gap: 20px;
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 10px 24px;
    color: #bbb;
    font-size: 13px;
  }
  .controls-bar span { color: #66ff88; font-weight: bold; }
  #messageBox {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.7);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 10;
  }
  #messageBox .msg {
    background: rgba(10,30,10,0.95);
    border: 2px solid #66ff88;
    border-radius: 14px;
    padding: 44px 64px;
    text-align: center;
    color: #fff;
    box-shadow: 0 0 40px rgba(0,255,80,0.3);
  }
  #messageBox .msg h1 { font-size: 38px; color: #66ff88; margin-bottom: 10px; text-shadow: 0 0 16px #00ff44; }
  #messageBox .msg p { font-size: 16px; color: #ccc; margin-bottom: 24px; }
  #messageBox .msg button {
    background: #66ff88;
    color: #000;
    border: none;
    border-radius: 8px;
    padding: 12px 36px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    transition: background 0.2s, box-shadow 0.2s;
    box-shadow: 0 0 16px rgba(0,255,80,0.4);
  }
  #messageBox .msg button:hover { background: #00ff44; box-shadow: 0 0 24px rgba(0,255,80,0.7); }
</style>
</head>
<body>
<div class="overlay"></div>
<div id="messageBox">
  <div class="msg">
    <h1>貪吃蛇</h1>
    <p>使用方向鍵控制蛇的移動方向<br>吃到食物得分，碰牆或碰到自己就結束</p>
    <button onclick="startGame()">開始遊戲</button>
  </div>
</div>
<div class="container">
  <div class="topbar">
    <h2>SNAKE</h2>
    <div class="stat"><div class="label">分數</div><div class="value" id="score">0</div></div>
    <div class="stat"><div class="label">最高分</div><div class="value" id="best">0</div></div>
    <div class="stat"><div class="label">等級</div><div class="value" id="level">1</div></div>
    <div class="stat"><div class="label">長度</div><div class="value" id="length">1</div></div>
  </div>
  <canvas id="gameCanvas" width="480" height="480"></canvas>
  <div class="controls-bar">
    <span>← → ↑ ↓</span> 移動 &nbsp;|&nbsp;
    <span>P</span> 暫停 &nbsp;|&nbsp;
    <span>R</span> 重新開始
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

const GRID = 20;
const COLS = canvas.width / GRID;
const ROWS = canvas.height / GRID;

let snake, dir, nextDir, food, bonus, score, best, level, gameLoop, isPaused, isOver;
best = 0;

const FOOD_COLORS = ['#ff4444','#ff8800','#ffee00','#ff44aa'];
const BONUS_COLOR = '#00ffff';

function rnd(max) { return Math.floor(Math.random() * max); }

function spawnFood() {
  let pos;
  do { pos = {x: rnd(COLS), y: rnd(ROWS)}; }
  while (snake.some(s => s.x === pos.x && s.y === pos.y));
  pos.color = FOOD_COLORS[rnd(FOOD_COLORS.length)];
  return pos;
}

function spawnBonus() {
  if (Math.random() > 0.3) return null;
  let pos;
  do { pos = {x: rnd(COLS), y: rnd(ROWS)}; }
  while (snake.some(s => s.x === pos.x && s.y === pos.y) || (food && pos.x === food.x && pos.y === food.y));
  pos.timer = 80 + rnd(60);
  return pos;
}

function startGame() {
  document.getElementById('messageBox').style.display = 'none';
  snake = [{x: Math.floor(COLS/2), y: Math.floor(ROWS/2)}];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  food = spawnFood();
  bonus = null;
  score = 0; level = 1; isPaused = false; isOver = false;
  updateUI();
  clearInterval(gameLoop);
  gameLoop = setInterval(tick, getSpeed());
  draw();
}

function getSpeed() { return Math.max(60, 180 - (level - 1) * 15); }

function tick() {
  if (isPaused || isOver) return;
  dir = {...nextDir};
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { endGame(); return; }
  // self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) { endGame(); return; }

  snake.unshift(head);

  let ate = false;
  if (head.x === food.x && head.y === food.y) {
    score += 10 * level;
    food = spawnFood();
    if (snake.length % 5 === 0) bonus = spawnBonus();
    ate = true;
    if (snake.length % 5 === 0) {
      level++;
      clearInterval(gameLoop);
      gameLoop = setInterval(tick, getSpeed());
    }
  } else if (bonus && head.x === bonus.x && head.y === bonus.y) {
    score += 50 * level;
    bonus = null;
    ate = true;
  } else {
    snake.pop();
  }

  if (bonus) {
    bonus.timer--;
    if (bonus.timer <= 0) bonus = null;
  }

  if (score > best) { best = score; document.getElementById('best').textContent = best; }
  updateUI();
  draw();
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  document.getElementById('length').textContent = snake.length;
}

function drawRoundRect(x, y, w, h, r, fill) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fillStyle = fill;
  ctx.fill();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // grid
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let c = 0; c <= COLS; c++) { ctx.beginPath(); ctx.moveTo(c*GRID, 0); ctx.lineTo(c*GRID, canvas.height); ctx.stroke(); }
  for (let r = 0; r <= ROWS; r++) { ctx.beginPath(); ctx.moveTo(0, r*GRID); ctx.lineTo(canvas.width, r*GRID); ctx.stroke(); }

  // food
  const fp = 3;
  drawRoundRect(food.x * GRID + fp, food.y * GRID + fp, GRID - fp*2, GRID - fp*2, 4, food.color);
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.fillRect(food.x * GRID + fp + 2, food.y * GRID + fp + 2, 4, 4);

  // bonus food
  if (bonus) {
    const flash = bonus.timer % 10 < 5;
    const alpha = flash ? 1 : 0.5;
    ctx.globalAlpha = alpha;
    drawRoundRect(bonus.x * GRID + fp, bonus.y * GRID + fp, GRID - fp*2, GRID - fp*2, 6, BONUS_COLOR);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('★', bonus.x * GRID + GRID/2, bonus.y * GRID + GRID/2);
    ctx.globalAlpha = 1;
  }

  // snake
  for (let i = 0; i < snake.length; i++) {
    const s = snake[i];
    const t = i / snake.length;
    const r = Math.round(40 + (102 - 40) * t);
    const g = Math.round(255 - (255 - 180) * t);
    const b = Math.round(40 + (60 - 40) * t);
    const color = `rgb(${r},${g},${b})`;
    const pad = i === 0 ? 1 : 2;
    drawRoundRect(s.x * GRID + pad, s.y * GRID + pad, GRID - pad*2, GRID - pad*2, i === 0 ? 6 : 4, color);
    if (i === 0) {
      // eyes
      ctx.fillStyle = '#fff';
      const ex = dir.y !== 0 ? [-4, 4] : [0, 0];
      const ey = dir.x !== 0 ? [-4, 4] : [0, 0];
      const ex2 = dir.x !== 0 ? [4, 4] : [0, 0];
      const ey2 = dir.y !== 0 ? [4, 4] : [0, 0];
      const cx2 = s.x * GRID + GRID/2;
      const cy2 = s.y * GRID + GRID/2;
      if (dir.x === 1) {
        ctx.beginPath(); ctx.arc(cx2 + 4, cy2 - 3, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx2 + 4, cy2 + 3, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(cx2 + 5, cy2 - 3, 1.2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx2 + 5, cy2 + 3, 1.2, 0, Math.PI*2); ctx.fill();
      } else if (dir.x === -1) {
        ctx.beginPath(); ctx.arc(cx2 - 4, cy2 - 3, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx2 - 4, cy2 + 3, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(cx2 - 5, cy2 - 3, 1.2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx2 - 5, cy2 + 3, 1.2, 0, Math.PI*2); ctx.fill();
      } else if (dir.y === -1) {
        ctx.beginPath(); ctx.arc(cx2 - 3, cy2 - 4, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx2 + 3, cy2 - 4, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(cx2 - 3, cy2 - 5, 1.2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx2 + 3, cy2 - 5, 1.2, 0, Math.PI*2); ctx.fill();
      } else {
        ctx.beginPath(); ctx.arc(cx2 - 3, cy2 + 4, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx2 + 3, cy2 + 4, 2.5, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#000';
        ctx.beginPath(); ctx.arc(cx2 - 3, cy2 + 5, 1.2, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(cx2 + 3, cy2 + 5, 1.2, 0, Math.PI*2); ctx.fill();
      }
    }
  }

  if (isPaused) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#66ff88';
    ctx.font = 'bold 42px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('暫停', canvas.width/2, canvas.height/2);
  }
}

function endGame() {
  isOver = true;
  clearInterval(gameLoop);
  if (score > best) best = score;
  const box = document.getElementById('messageBox');
  box.innerHTML = `<div class="msg"><h1>遊戲結束</h1><p>分數：${score} &nbsp;|&nbsp; 最高分：${best}</p><button onclick="startGame()">再玩一次</button></div>`;
  box.style.display = 'flex';
}

document.addEventListener('keydown', e => {
  if (e.key === 'r' || e.key === 'R') { startGame(); return; }
  if (isOver) return;
  if (e.key === 'p' || e.key === 'P') {
    isPaused = !isPaused;
    if (!isPaused) gameLoop = setInterval(tick, getSpeed());
    else clearInterval(gameLoop);
    draw(); return;
  }
  if (isPaused) return;
  const dirs = {
    'ArrowUp':    {x: 0, y: -1},
    'ArrowDown':  {x: 0, y: 1},
    'ArrowLeft':  {x: -1, y: 0},
    'ArrowRight': {x: 1, y: 0},
  };
  if (dirs[e.key]) {
    const nd = dirs[e.key];
    if (nd.x !== -dir.x || nd.y !== -dir.y) nextDir = nd;
    e.preventDefault();
  }
});
</script>
</body>
</html>
