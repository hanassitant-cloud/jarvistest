<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>俄羅斯方塊</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #111;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    min-height: 100vh;
    font-family: Arial, sans-serif;
    color: white;
    touch-action: none;
    user-select: none;
  }
  #game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 400px;
    padding: 10px;
  }
  #top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    margin-bottom: 8px;
  }
  .stat-box {
    background: #222;
    border-radius: 8px;
    padding: 6px 12px;
    text-align: center;
    min-width: 70px;
  }
  .stat-label { font-size: 10px; color: #888; text-transform: uppercase; }
  .stat-value { font-size: 20px; font-weight: bold; }
  #canvas-wrapper {
    position: relative;
    display: flex;
    gap: 8px;
    align-items: flex-start;
  }
  canvas#board {
    display: block;
    border: 2px solid #333;
    border-radius: 4px;
  }
  #sidebar {
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: center;
  }
  #sidebar .stat-box { width: 70px; }
  canvas#next-canvas {
    background: #222;
    border-radius: 8px;
  }
  #controls {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 8px;
    width: 100%;
    max-width: 300px;
    margin-top: 12px;
  }
  .btn {
    background: #222;
    border: 2px solid #444;
    border-radius: 12px;
    color: white;
    font-size: 24px;
    padding: 16px;
    text-align: center;
    cursor: pointer;
    transition: background 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:active { background: #444; }
  #btn-left  { grid-column: 1; grid-row: 2; }
  #btn-right { grid-column: 3; grid-row: 2; }
  #btn-rotate { grid-column: 2; grid-row: 1; }
  #btn-down  { grid-column: 2; grid-row: 2; }
  #btn-drop  { grid-column: 1; grid-row: 1; font-size: 14px; }
  #btn-pause { grid-column: 3; grid-row: 1; font-size: 14px; }
  #overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.75);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    display: none;
  }
  #overlay h2 { font-size: 28px; color: #ff4444; margin-bottom: 12px; }
  #overlay p  { font-size: 14px; color: #ccc; margin-bottom: 16px; }
  #btn-restart {
    background: #333;
    border: 2px solid #555;
    border-radius: 8px;
    color: white;
    font-size: 16px;
    padding: 10px 24px;
    cursor: pointer;
  }
</style>
</head>
<body>
<div id="game-container">
  <div id="top-bar">
    <div class="stat-box">
      <div class="stat-label">分數</div>
      <div class="stat-value" id="score">0</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">等級</div>
      <div class="stat-value" id="level">1</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">消行</div>
      <div class="stat-value" id="lines">0</div>
    </div>
  </div>

  <div id="canvas-wrapper">
    <canvas id="board"></canvas>
    <div id="sidebar">
      <div class="stat-box" style="width:70px;">
        <div class="stat-label">下一個</div>
      </div>
      <canvas id="next-canvas" width="70" height="70"></canvas>
    </div>
    <div id="overlay">
      <h2 id="overlay-title">GAME OVER</h2>
      <p id="overlay-msg">點擊重新開始</p>
      <button id="btn-restart">重新開始</button>
    </div>
  </div>

  <div id="controls">
    <button class="btn" id="btn-drop">落底</button>
    <button class="btn" id="btn-rotate">↑</button>
    <button class="btn" id="btn-pause">暫停</button>
    <button class="btn" id="btn-left">←</button>
    <button class="btn" id="btn-down">↓</button>
    <button class="btn" id="btn-right">→</button>
  </div>
</div>

<script>
const COLS = 10, ROWS = 20;
let BLOCK;
const COLORS = {
  I: '#00f0f0', O: '#f0f000', T: '#a000f0',
  S: '#00f000', Z: '#f00000', J: '#0000f0', L: '#f0a000'
};
const SHAPES = {
  I: [[1,1,1,1]],
  O: [[1,1],[1,1]],
  T: [[0,1,0],[1,1,1]],
  S: [[0,1,1],[1,1,0]],
  Z: [[1,1,0],[0,1,1]],
  J: [[1,0,0],[1,1,1]],
  L: [[0,0,1],[1,1,1]]
};
const SCORE_TABLE = [0, 100, 300, 500, 800];

const boardCanvas = document.getElementById('board');
const ctx = boardCanvas.getContext('2d');
const nextCanvas = document.getElementById('next-canvas');
const nctx = nextCanvas.getContext('2d');

function resize() {
  const maxH = window.innerHeight - 280;
  const maxW = window.innerWidth - 100;
  BLOCK = Math.floor(Math.min(maxH / ROWS, maxW / COLS));
  BLOCK = Math.max(BLOCK, 20);
  boardCanvas.width  = BLOCK * COLS;
  boardCanvas.height = BLOCK * ROWS;
}
resize();
window.addEventListener('resize', () => { resize(); draw(); });

let board, piece, next, score, level, linesCleared, fallTimer, fallSpeed, gameOver, paused;

function newBoard() {
  return Array.from({length: ROWS}, () => Array(COLS).fill(null));
}
function randomPiece() {
  const keys = Object.keys(SHAPES);
  const key = keys[Math.floor(Math.random() * keys.length)];
  return { type: key, shape: SHAPES[key].map(r => [...r]), color: COLORS[key],
           x: Math.floor(COLS / 2) - Math.floor(SHAPES[key][0].length / 2), y: -SHAPES[key].length };
}
function rotate(shape) {
  return shape[0].map((_, i) => shape.map(r => r[i]).reverse());
}
function valid(b, s, x, y) {
  for (let r = 0; r < s.length; r++)
    for (let c = 0; c < s[r].length; c++)
      if (s[r][c]) {
        const nx = x + c, ny = y + r;
        if (nx < 0 || nx >= COLS || ny >= ROWS) return false;
        if (ny >= 0 && b[ny][nx]) return false;
      }
  return true;
}
function place() {
  for (let r = 0; r < piece.shape.length; r++)
    for (let c = 0; c < piece.shape[r].length; c++)
      if (piece.shape[r][c] && piece.y + r >= 0)
        board[piece.y + r][piece.x + c] = piece.color;
}
function clearLines() {
  let n = 0;
  for (let r = ROWS - 1; r >= 0; r--) {
    if (board[r].every(c => c)) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(null));
      n++; r++;
    }
  }
  return n;
}
function ghostY() {
  let gy = piece.y;
  while (valid(board, piece.shape, piece.x, gy + 1)) gy++;
  return gy;
}

function startGame() {
  board = newBoard();
  piece = randomPiece();
  next  = randomPiece();
  score = 0; level = 1; linesCleared = 0;
  fallTimer = 0; fallSpeed = 500;
  gameOver = false; paused = false;
  document.getElementById('overlay').style.display = 'none';
  updateStats();
  lastTime = performance.now();
  requestAnimationFrame(loop);
}

function updateStats() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  document.getElementById('lines').textContent = linesCleared;
}

function drawBlock(c, x, y, alpha) {
  ctx.globalAlpha = alpha ?? 1;
  ctx.fillStyle = c;
  ctx.fillRect(x * BLOCK + 1, y * BLOCK + 1, BLOCK - 2, BLOCK - 2);
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = 1;
  ctx.strokeRect(x * BLOCK + 1, y * BLOCK + 1, BLOCK - 2, BLOCK - 2);
  ctx.globalAlpha = 1;
}

function draw() {
  // background image
  if (bgImg.complete) {
    ctx.globalAlpha = 1;
    // cover-fit the image
    const iw = bgImg.naturalWidth, ih = bgImg.naturalHeight;
    const cw = boardCanvas.width,  ch = boardCanvas.height;
    const scale = Math.max(cw/iw, ch/ih);
    const sw = iw*scale, sh = ih*scale;
    ctx.drawImage(bgImg, (cw-sw)/2, (ch-sh)/2, sw, sh);
    // dark overlay so blocks are visible
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.fillRect(0, 0, cw, ch);
  } else {
    ctx.fillStyle = '#111';
    ctx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);
  }

  // grid
  ctx.strokeStyle = '#1e1e1e';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) { ctx.beginPath(); ctx.moveTo(x*BLOCK,0); ctx.lineTo(x*BLOCK, boardCanvas.height); ctx.stroke(); }
  for (let y = 0; y <= ROWS; y++) { ctx.beginPath(); ctx.moveTo(0,y*BLOCK); ctx.lineTo(boardCanvas.width, y*BLOCK); ctx.stroke(); }

  // board
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (board[r][c]) drawBlock(board[r][c], c, r);

  if (!gameOver && piece) {
    // ghost
    const gy = ghostY();
    for (let r = 0; r < piece.shape.length; r++)
      for (let c = 0; c < piece.shape[r].length; c++)
        if (piece.shape[r][c] && gy+r >= 0)
          drawBlock(piece.color, piece.x+c, gy+r, 0.2);

    // piece
    for (let r = 0; r < piece.shape.length; r++)
      for (let c = 0; c < piece.shape[r].length; c++)
        if (piece.shape[r][c] && piece.y+r >= 0)
          drawBlock(piece.color, piece.x+c, piece.y+r);
  }

  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, boardCanvas.width, boardCanvas.height);
    ctx.fillStyle = 'white';
    ctx.font = `bold ${BLOCK*1.5}px Arial`;
    ctx.textAlign = 'center';
    ctx.fillText('暫停', boardCanvas.width/2, boardCanvas.height/2);
  }

  // next piece
  nctx.fillStyle = '#222';
  nctx.fillRect(0, 0, 70, 70);
  if (next) {
    const nb = 14;
    const ox = Math.floor((70 - next.shape[0].length * nb) / 2);
    const oy = Math.floor((70 - next.shape.length * nb) / 2);
    for (let r = 0; r < next.shape.length; r++)
      for (let c = 0; c < next.shape[r].length; c++)
        if (next.shape[r][c]) {
          nctx.fillStyle = next.color;
          nctx.fillRect(ox + c*nb+1, oy + r*nb+1, nb-2, nb-2);
        }
  }
}

function lock() {
  place();
  const n = clearLines();
  linesCleared += n;
  score += SCORE_TABLE[n] * level;
  level = Math.floor(linesCleared / 10) + 1;
  fallSpeed = Math.max(80, 500 - (level-1)*40);
  piece = next;
  next  = randomPiece();
  if (!valid(board, piece.shape, piece.x, piece.y)) {
    gameOver = true;
    document.getElementById('overlay').style.display = 'flex';
  }
  updateStats();
}

function moveLeft()   { if (valid(board, piece.shape, piece.x-1, piece.y)) piece.x--; }
function moveRight()  { if (valid(board, piece.shape, piece.x+1, piece.y)) piece.x++; }
function moveDown()   { if (valid(board, piece.shape, piece.x, piece.y+1)) { piece.y++; fallTimer=0; } else lock(); }
function hardDrop()   { piece.y = ghostY(); lock(); fallTimer=0; }
function rotatePiece(){ const r=rotate(piece.shape); if(valid(board,r,piece.x,piece.y)) piece.shape=r; }

let lastTime = 0;
function loop(ts) {
  if (gameOver) return;
  const dt = ts - lastTime; lastTime = ts;
  if (!paused) {
    fallTimer += dt;
    if (fallTimer >= fallSpeed) { fallTimer=0; if(valid(board,piece.shape,piece.x,piece.y+1)) piece.y++; else lock(); }
  }
  draw();
  requestAnimationFrame(loop);
}

// Keyboard
document.addEventListener('keydown', e => {
  if (gameOver) return;
  if (e.key==='p'||e.key==='P') { paused=!paused; return; }
  if (paused) return;
  switch(e.key) {
    case 'ArrowLeft':  moveLeft();  break;
    case 'ArrowRight': moveRight(); break;
    case 'ArrowDown':  moveDown();  break;
    case 'ArrowUp':    rotatePiece(); break;
    case ' ':          hardDrop();  break;
  }
  e.preventDefault();
});

// Buttons
document.getElementById('btn-left').addEventListener('pointerdown',  e=>{e.preventDefault();if(!gameOver&&!paused)moveLeft();});
document.getElementById('btn-right').addEventListener('pointerdown', e=>{e.preventDefault();if(!gameOver&&!paused)moveRight();});
document.getElementById('btn-down').addEventListener('pointerdown',  e=>{e.preventDefault();if(!gameOver&&!paused)moveDown();});
document.getElementById('btn-rotate').addEventListener('pointerdown',e=>{e.preventDefault();if(!gameOver&&!paused)rotatePiece();});
document.getElementById('btn-drop').addEventListener('pointerdown',  e=>{e.preventDefault();if(!gameOver&&!paused)hardDrop();});
document.getElementById('btn-pause').addEventListener('pointerdown', e=>{e.preventDefault();if(!gameOver)paused=!paused;});
document.getElementById('btn-restart').addEventListener('pointerdown', e=>{e.preventDefault();startGame();});

// Swipe
let tx=0, ty=0;
boardCanvas.addEventListener('touchstart', e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; e.preventDefault(); }, {passive:false});
boardCanvas.addEventListener('touchend', e=>{
  if(gameOver||paused) return;
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if(Math.abs(dx)<10&&Math.abs(dy)<10) { rotatePiece(); return; }
  if(Math.abs(dx)>Math.abs(dy)) { if(dx>0) moveRight(); else moveLeft(); }
  else { if(dy>0) moveDown(); else hardDrop(); }
  e.preventDefault();
}, {passive:false});

startGame();
</script>
</body>
</html>
